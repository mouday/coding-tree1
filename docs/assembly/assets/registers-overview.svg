<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" width="100%" height="auto" style="max-width:820px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <defs>
    <linearGradient id="genGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="segGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="ptrGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="flagGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="820" height="440" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="410" y="28" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="bold">x86 32 位寄存器分类概览</text>

  <!-- General Purpose Registers -->
  <rect x="20" y="42" width="380" height="188" rx="10" fill="url(#genGrad)" opacity="0.06" stroke="#6366f1" stroke-width="1"/>
  <text x="210" y="62" text-anchor="middle" fill="#4338ca" font-size="13" font-weight="bold">通用寄存器 (8 个)</text>

  <!-- EAX -->
  <rect x="35" y="72" width="350" height="28" rx="6" fill="url(#genGrad)" opacity="0.92"/>
  <text x="50" y="91" fill="#fff" font-size="11" font-weight="bold">EAX</text>
  <text x="105" y="91" fill="rgba(255,255,255,0.85)" font-size="9">累加器 | 返回值 | 算术运算</text>
  <rect x="70" y="100" width="280" height="1" fill="#6366f1" opacity="0.3"/>
  <text x="55" y="112" fill="#6366f1" font-size="8">AX(16位)</text>
  <text x="135" y="112" fill="#6366f1" font-size="8">AH(高8位)</text>
  <text x="220" y="112" fill="#6366f1" font-size="8">AL(低8位)</text>

  <rect x="35" y="120" width="350" height="20" rx="5" fill="url(#genGrad)" opacity="0.92"/>
  <text x="50" y="135" fill="#fff" font-size="11" font-weight="bold">EBX</text>
  <text x="105" y="135" fill="rgba(255,255,255,0.85)" font-size="9">基址寄存器</text>

  <rect x="35" y="145" width="350" height="20" rx="5" fill="url(#genGrad)" opacity="0.92"/>
  <text x="50" y="160" fill="#fff" font-size="11" font-weight="bold">ECX</text>
  <text x="105" y="160" fill="rgba(255,255,255,0.85)" font-size="9">计数器 | 循环计数 | 移位操作</text>

  <rect x="35" y="170" width="350" height="20" rx="5" fill="url(#genGrad)" opacity="0.92"/>
  <text x="50" y="185" fill="#fff" font-size="11" font-weight="bold">EDX</text>
  <text x="105" y="185" fill="rgba(255,255,255,0.85)" font-size="9">数据寄存器 | 乘除法高位结果</text>

  <rect x="35" y="195" width="350" height="20" rx="5" fill="url(#genGrad)" opacity="0.92"/>
  <text x="50" y="210" fill="#fff" font-size="11" font-weight="bold">ESI · EDI · EBP · ESP</text>
  <text x="210" y="210" fill="rgba(255,255,255,0.85)" font-size="9">（详见下方指针寄存器）</text>

  <!-- Segment Registers -->
  <rect x="420" y="42" width="380" height="188" rx="10" fill="url(#segGrad)" opacity="0.06" stroke="#f59e0b" stroke-width="1"/>
  <text x="610" y="62" text-anchor="middle" fill="#b45309" font-size="13" font-weight="bold">段寄存器 (6 个)</text>

  <rect x="435" y="72" width="350" height="22" rx="5" fill="url(#segGrad)" opacity="0.92"/>
  <text x="452" y="88" fill="#fff" font-size="11" font-weight="bold">CS</text>
  <text x="490" y="88" fill="rgba(255,255,255,0.85)" font-size="9">代码段 | 指向当前指令所在段</text>

  <rect x="435" y="99" width="350" height="22" rx="5" fill="url(#segGrad)" opacity="0.92"/>
  <text x="452" y="115" fill="#fff" font-size="11" font-weight="bold">DS</text>
  <text x="490" y="115" fill="rgba(255,255,255,0.85)" font-size="9">数据段 | 大部分数据访问的段</text>

  <rect x="435" y="126" width="350" height="22" rx="5" fill="url(#segGrad)" opacity="0.92"/>
  <text x="452" y="142" fill="#fff" font-size="11" font-weight="bold">SS</text>
  <text x="490" y="142" fill="rgba(255,255,255,0.85)" font-size="9">栈段 | 栈所在的段基址</text>

  <rect x="435" y="153" width="350" height="22" rx="5" fill="url(#segGrad)" opacity="0.92"/>
  <text x="452" y="169" fill="#fff" font-size="11" font-weight="bold">ES</text>
  <text x="490" y="169" fill="rgba(255,255,255,0.85)" font-size="9">附加段 | 字符串操作额外数据段</text>

  <rect x="435" y="180" width="172" height="22" rx="5" fill="url(#segGrad)" opacity="0.92"/>
  <text x="452" y="196" fill="#fff" font-size="11" font-weight="bold">FS</text>
  <text x="490" y="196" fill="rgba(255,255,255,0.85)" font-size="9">通用（线程局部存储）</text>

  <rect x="613" y="180" width="172" height="22" rx="5" fill="url(#segGrad)" opacity="0.92"/>
  <text x="630" y="196" fill="#fff" font-size="11" font-weight="bold">GS</text>
  <text x="668" y="196" fill="rgba(255,255,255,0.85)" font-size="9">通用（线程局部存储）</text>

  <!-- Pointer Registers -->
  <rect x="20" y="245" width="380" height="90" rx="10" fill="url(#ptrGrad)" opacity="0.06" stroke="#10b981" stroke-width="1"/>
  <text x="210" y="265" text-anchor="middle" fill="#059669" font-size="13" font-weight="bold">指针和变址寄存器</text>

  <rect x="35" y="275" width="350" height="22" rx="5" fill="url(#ptrGrad)" opacity="0.92"/>
  <text x="50" y="291" fill="#fff" font-size="11" font-weight="bold">EIP</text>
  <text x="105" y="291" fill="rgba(255,255,255,0.85)" font-size="9">指令指针 | 下一条指令地址 (不可直接访问)</text>

  <rect x="35" y="302" width="350" height="22" rx="5" fill="url(#ptrGrad)" opacity="0.92"/>
  <text x="50" y="318" fill="#fff" font-size="11" font-weight="bold">ESP</text>
  <text x="105" y="318" fill="rgba(255,255,255,0.85)" font-size="9">栈指针 | 指向栈顶 | PUSH/POP 自动修改</text>

  <!-- Flags Register -->
  <rect x="420" y="245" width="380" height="90" rx="10" fill="url(#flagGrad)" opacity="0.06" stroke="#ef4444" stroke-width="1"/>
  <text x="610" y="265" text-anchor="middle" fill="#dc2626" font-size="13" font-weight="bold">标志寄存器 (EFLAGS)</text>

  <rect x="435" y="275" width="350" height="22" rx="5" fill="url(#flagGrad)" opacity="0.92"/>
  <text x="455" y="291" fill="#fff" font-size="10" font-weight="bold">CF</text>
  <text x="485" y="291" fill="rgba(255,255,255,0.85)" font-size="8">进位</text>
  <text x="525" y="291" fill="#fff" font-size="10" font-weight="bold">ZF</text>
  <text x="552" y="291" fill="rgba(255,255,255,0.85)" font-size="8">零</text>
  <text x="585" y="291" fill="#fff" font-size="10" font-weight="bold">SF</text>
  <text x="612" y="291" fill="rgba(255,255,255,0.85)" font-size="8">符号</text>
  <text x="645" y="291" fill="#fff" font-size="10" font-weight="bold">OF</text>
  <text x="672" y="291" fill="rgba(255,255,255,0.85)" font-size="8">溢出</text>

  <text x="610" y="325" text-anchor="middle" fill="#64748b" font-size="10">共 9 个常用标志：CF · PF · AF · ZF · SF · TF · IF · DF · OF</text>

  <!-- Callout -->
  <rect x="35" y="355" width="750" height="68" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="55" y="377" fill="#4338ca" font-size="11" font-weight="bold">寄存器命名规律</text>
  <text x="55" y="395" fill="#4f46e5" font-size="10">E 前缀 = Extended（扩展到 32 位），如 AX(16位) → EAX(32位)</text>
  <text x="55" y="412" fill="#4f46e5" font-size="10">X 后缀表示可拆分为高低字节，如 AX 可拆为 AH (高 8 位) 和 AL (低 8 位)</text>
</svg>

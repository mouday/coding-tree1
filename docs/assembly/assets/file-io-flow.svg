<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="auto" style="max-width:800px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <defs>
    <marker id="fArrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
    <marker id="fArrowRead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="220" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="28" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="bold">文件操作基本流程</text>

  <!-- Write flow -->
  <rect x="20" y="42" width="370" height="62" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="205" y="62" text-anchor="middle" fill="#4338ca" font-size="11" font-weight="bold">写入流程 (sys_write)</text>

  <rect x="35" y="74" width="80" height="24" rx="5" fill="#6366f1" opacity="0.9"/>
  <text x="75" y="91" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">sys_open</text>

  <line x1="115" y1="86" x2="140" y2="86" stroke="#6366f1" stroke-width="1.5" marker-end="url(#fArrow)"/>

  <rect x="145" y="74" width="80" height="24" rx="5" fill="#818cf8" opacity="0.9"/>
  <text x="185" y="91" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">sys_write</text>

  <line x1="225" y1="86" x2="250" y2="86" stroke="#6366f1" stroke-width="1.5" marker-end="url(#fArrow)"/>

  <rect x="255" y="74" width="80" height="24" rx="5" fill="#a5b4fc" opacity="0.9"/>
  <text x="295" y="91" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">sys_close</text>

  <!-- Read flow -->
  <rect x="410" y="42" width="370" height="62" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="595" y="62" text-anchor="middle" fill="#059669" font-size="11" font-weight="bold">读取流程 (sys_read)</text>

  <rect x="425" y="74" width="80" height="24" rx="5" fill="#10b981" opacity="0.9"/>
  <text x="465" y="91" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">sys_open</text>

  <line x1="505" y1="86" x2="530" y2="86" stroke="#10b981" stroke-width="1.5" marker-end="url(#fArrowRead)"/>

  <rect x="535" y="74" width="80" height="24" rx="5" fill="#34d399" opacity="0.9"/>
  <text x="575" y="91" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">sys_read</text>

  <line x1="615" y1="86" x2="640" y2="86" stroke="#10b981" stroke-width="1.5" marker-end="url(#fArrowRead)"/>

  <rect x="645" y="74" width="80" height="24" rx="5" fill="#6ee7b7" opacity="0.9"/>
  <text x="685" y="91" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">sys_close</text>

  <!-- File descriptors -->
  <rect x="20" y="118" width="760" height="84" rx="10" fill="#f1f5f9"/>
  <text x="400" y="140" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">文件描述符 (File Descriptor)  —  前三个由系统自动分配</text>

  <rect x="50" y="155" width="160" height="36" rx="6" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="130" y="172" text-anchor="middle" fill="#4338ca" font-size="11" font-weight="bold">stdin (fd=0)</text>
  <text x="130" y="186" text-anchor="middle" fill="#64748b" font-size="9">标准输入 - 键盘</text>

  <rect x="230" y="155" width="160" height="36" rx="6" fill="#fff" stroke="#10b981" stroke-width="1.5"/>
  <text x="310" y="172" text-anchor="middle" fill="#059669" font-size="11" font-weight="bold">stdout (fd=1)</text>
  <text x="310" y="186" text-anchor="middle" fill="#64748b" font-size="9">标准输出 - 屏幕</text>

  <rect x="410" y="155" width="160" height="36" rx="6" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="490" y="172" text-anchor="middle" fill="#dc2626" font-size="11" font-weight="bold">stderr (fd=2)</text>
  <text x="490" y="186" text-anchor="middle" fill="#64748b" font-size="9">标准错误 - 屏幕</text>

  <rect x="590" y="155" width="160" height="36" rx="6" fill="#fff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="670" y="172" text-anchor="middle" fill="#b45309" font-size="11" font-weight="bold">自定义 fd (3+)</text>
  <text x="670" y="186" text-anchor="middle" fill="#64748b" font-size="9">打开的文件</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 500" width="100%" height="auto" style="max-width:820px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <defs>
    <marker id="addrArrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="820" height="500" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="410" y="28" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="bold">x86 寻址方式一览</text>

  <!-- Mode 1: Immediate -->
  <rect x="20" y="42" width="380" height="58" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <circle cx="48" cy="71" r="14" fill="#6366f1"/>
  <text x="48" y="75" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">1</text>
  <text x="72" y="66" fill="#3730a3" font-size="12" font-weight="bold">立即寻址</text>
  <text x="72" y="83" fill="#64748b" font-size="10">mov eax, 42 — 值直接在指令中，CPU 直接使用编码的值</text>

  <!-- Mode 2: Register -->
  <rect x="420" y="42" width="380" height="58" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <circle cx="448" cy="71" r="14" fill="#10b981"/>
  <text x="448" y="75" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">2</text>
  <text x="472" y="66" fill="#065f46" font-size="12" font-weight="bold">寄存器寻址</text>
  <text x="472" y="83" fill="#64748b" font-size="10">mov eax, ebx — 值在寄存器中，CPU 直接读寄存器</text>

  <!-- Mode 3: Direct -->
  <rect x="20" y="110" width="380" height="58" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <circle cx="48" cy="139" r="14" fill="#f97316"/>
  <text x="48" y="143" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">3</text>
  <text x="72" y="134" fill="#9a3412" font-size="12" font-weight="bold">直接寻址</text>
  <text x="72" y="151" fill="#64748b" font-size="10">mov eax, [var] — 地址直接写在指令中，CPU → 内存[var] → 值</text>

  <!-- Mode 4: Indirect -->
  <rect x="420" y="110" width="380" height="58" rx="10" fill="#fdf2f8" stroke="#ec4899" stroke-width="1"/>
  <circle cx="448" cy="139" r="14" fill="#ec4899"/>
  <text x="448" y="143" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">4</text>
  <text x="472" y="134" fill="#9d174d" font-size="12" font-weight="bold">寄存器间接寻址</text>
  <text x="472" y="151" fill="#64748b" font-size="10">mov eax, [ebx] — 寄存器存地址，CPU → 内存[reg] → 值</text>

  <!-- Mode 5: Base+Offset -->
  <rect x="20" y="178" width="380" height="58" rx="10" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1"/>
  <circle cx="48" cy="207" r="14" fill="#14b8a6"/>
  <text x="48" y="211" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">5</text>
  <text x="72" y="202" fill="#0f766e" font-size="12" font-weight="bold">基址寻址</text>
  <text x="72" y="219" fill="#64748b" font-size="10">mov eax, [ebx+8] — 基址 + 偏移，CPU → 内存[ebx+8] → 值</text>

  <!-- Mode 6: Indexed -->
  <rect x="420" y="178" width="380" height="58" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <circle cx="448" cy="207" r="14" fill="#8b5cf6"/>
  <text x="448" y="211" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">6</text>
  <text x="472" y="202" fill="#5b21b6" font-size="12" font-weight="bold">变址寻址</text>
  <text x="472" y="219" fill="#64748b" font-size="10">mov eax, [arr+esi*4] — 基址+索引×比例</text>

  <!-- Mode 7: Base+Index -->
  <rect x="220" y="246" width="380" height="58" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="1"/>
  <circle cx="248" cy="275" r="14" fill="#eab308"/>
  <text x="248" y="279" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">7</text>
  <text x="272" y="270" fill="#854d0e" font-size="12" font-weight="bold">基址变址寻址</text>
  <text x="272" y="288" fill="#64748b" font-size="10">mov eax, [ebx+esi*4+8] — 全能模式：基址+变址×比例+位移</text>

  <!-- Summary card -->
  <rect x="20" y="320" width="780" height="60" rx="12" fill="#0f172a"/>
  <text x="410" y="345" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">寻址方式完整公式</text>
  <text x="410" y="366" text-anchor="middle" fill="#818cf8" font-size="13" font-family="monospace" font-weight="bold">有效地址 = 基址寄存器 + 变址寄存器 × 比例因子 + 位移量</text>

  <!-- Formula component boxes - wider to fit text -->
  <rect x="20" y="395" width="240" height="34" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="140" y="408" text-anchor="middle" fill="#94a3b8" font-size="10">基址寄存器</text>
  <text x="140" y="423" text-anchor="middle" fill="#818cf8" font-size="9">EAX/EBX/ECX/EDX/EBP/ESP/ESI/EDI</text>

  <rect x="275" y="395" width="220" height="34" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="385" y="408" text-anchor="middle" fill="#94a3b8" font-size="10">变址寄存器</text>
  <text x="385" y="423" text-anchor="middle" fill="#818cf8" font-size="9">EAX/EBX/ECX/EDX/ESI/EDI</text>

  <rect x="508" y="395" width="120" height="34" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="568" y="408" text-anchor="middle" fill="#94a3b8" font-size="10">比例因子</text>
  <text x="568" y="423" text-anchor="middle" fill="#818cf8" font-size="9">1 / 2 / 4 / 8</text>

  <rect x="640" y="395" width="160" height="34" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="720" y="408" text-anchor="middle" fill="#94a3b8" font-size="10">位移量</text>
  <text x="720" y="423" text-anchor="middle" fill="#818cf8" font-size="9">8 / 16 / 32 位值</text>

  <!-- Note -->
  <text x="410" y="458" text-anchor="middle" fill="#64748b" font-size="9">* 比例因子和位移量仅在 32 位保护模式下可用。ESP 不能作为变址寄存器。</text>
  <text x="410" y="478" text-anchor="middle" fill="#94a3b8" font-size="8">公式中除基址寄存器外，其余部分均可选省略</text>
</svg>
